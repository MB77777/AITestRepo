spring:
  application:
    name: loan-copilot-backend
  config:
    import: optional:file:../.env[.properties]

server:
  port: 8080

app:
  openrouter:
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENROUTER_MODEL:deepseek/deepseek-v3.2}
    fallback-model: ${OPENROUTER_FALLBACK_MODEL:z-ai/glm-4.7-flash}
    temperature: ${OPENROUTER_TEMPERATURE:0.1}
    api-key: ${OPENROUTER_API_KEY:${OPENAI_API_KEY:}}

logging:
  level:
    root: INFO
    com.silkycoders1.jsystemssilkycodders1: DEBUG
    org.bsc.langgraph4j: INFO
